spring:
  application:
    name: studyloop-backend

  # Pull in local secrets from a git-ignored file (backend/.env.properties).
  # "optional:" = don't crash if the file is missing — in the cloud (Phase 6)
  # the same keys arrive as real environment variables instead.
  config:
    import: optional:file:.env.properties

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Supabase free tier allows few concurrent connections — keep our pool small.
      maximum-pool-size: 5

  jpa:
    hibernate:
      # Flyway owns the schema; Hibernate only checks entities match it at startup.
      ddl-auto: validate
    # Keeps DB connections out of the web layer; we load what we need inside services.
    open-in-view: false

  servlet:
    multipart:
      # Lecture PDFs can be sizeable; the Spring default (1MB) is too small.
      max-file-size: 25MB
      max-request-size: 25MB

# Our own settings — bound to JwtProperties/CorsProperties via @ConfigurationPropertiesScan.
studyloop:
  jwt:
    # HMAC signing key, >= 32 bytes. Real value: .env.properties locally, secrets in CI/cloud.
    secret: ${JWT_SECRET}
    access-ttl: 15m
    refresh-ttl: 7d
  cors:
    # Browser origins allowed to call the API. The Phase 3 React app runs on Vite's
    # dev server (5173). Override in the cloud via CORS_ALLOWED_ORIGINS (comma-separated).
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  storage:
    # Filesystem root for uploaded document bytes. Relative to the backend working dir in
    # dev (→ backend/data/documents, git-ignored); a mounted volume via DOCUMENTS_DIR in the cloud.
    documents-dir: ${DOCUMENTS_DIR:./data/documents}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      # Dev convenience: show the db component inside /actuator/health.
      show-details: always
