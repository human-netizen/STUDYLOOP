# Serves the single-page app: hand every unknown path to index.html so client-side routing
# (React Router) handles it instead of nginx returning 404.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache the fingerprinted assets Vite emits under /assets/.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
